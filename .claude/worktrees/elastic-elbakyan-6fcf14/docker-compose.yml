services:
  mcp:
    image: ghcr.io/and-ri/marketing-mcp:latest
    # Local development (build from source): comment the line above, uncomment below
    # build: .
    restart: unless-stopped
    ports:
      - "8080:8080"              # Nginx Proxy Manager points here
    volumes:
      - mcp_data:/app/data       # SQLite database persists here
    environment:
      MCP_PORT: "8080"
    healthcheck:
      test: ["CMD", "php", "-r", "exit(file_get_contents('http://localhost:8080/health') === 'OK' ? 0 : 1);"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mcp_data:
