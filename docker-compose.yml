services:
  mcp:
    build: ${MCP_BUILD_CONTEXT:-.}
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - mcp_data:/app/data
    environment:
      MCP_PORT: "8080"
    healthcheck:
      test: ["CMD", "php", "-r", "exit(file_get_contents('http://localhost:8080/health') === 'OK' ? 0 : 1);"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - proxy

volumes:
  mcp_data:

networks:
  proxy:
    external: true
