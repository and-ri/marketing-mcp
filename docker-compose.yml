services:
  mcp:
    image: ghcr.io/and-ri/marketing-mcp:latest
    # To build locally instead: comment the line above and uncomment below
    # build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - mcp_data:/app/data
    environment:
      MCP_PORT: "8080"
      MCP_BASE_URL: ""   # set your domain, e.g. https://mcp.example.com
    healthcheck:
      test: ["CMD", "php", "-r", "exit(file_get_contents('http://localhost:8080/health') === 'OK' ? 0 : 1);"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - proxy

volumes:
  mcp_data:

networks:
  proxy:
    external: true
