# Temporary HTTP-only config used before the SSL certificate exists.
# Once the cert is issued, nginx reloads and uses mcp.conf instead.
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'waiting for SSL cert\n';
        add_header Content-Type text/plain;
    }
}
