# ── HTTP → HTTPS redirect + ACME challenge ────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt ACME challenge (certbot writes here)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS reverse proxy ───────────────────────────────────────────────────────
# NOTE: This block is inactive until the SSL certificate exists.
# See README → "First deploy" for the correct startup sequence.
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # ── MCP endpoint ──────────────────────────────────────────────────────────
    location /mcp {
        proxy_pass         http://mcp:8080/mcp;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for SSE (text/event-stream) responses
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://mcp:8080/health;
    }
}
